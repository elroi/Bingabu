<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var SUPPORTED = ["en", "he"];
        function norm(t) {
          if (!t) return null;
          var l = String(t).trim().toLowerCase();
          if (SUPPORTED.indexOf(l) >= 0) return l;
          var two = l.slice(0, 2);
          if (SUPPORTED.indexOf(two) >= 0) return two;
          return null;
        }
        try {
          var params = new URLSearchParams(window.location.search);
          var loc = norm(params.get("lang"));
          if (!loc) loc = norm(localStorage.getItem("bingabu-locale"));
          if (!loc) {
            var n = (navigator.language || "").toLowerCase();
            if (n.indexOf("he") === 0) loc = "he";
          }
          if (!loc) loc = "en";
          document.documentElement.lang = loc;
          document.documentElement.dir = loc === "he" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectate – Bingabu</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #ff6b6b;
        --secondary: #4ecdc4;
        --accent: #ffe66d;
        --bg: #f7f9fc;
        --text: #2d3436;
      }
      body {
        font-family: "Quicksand", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #wrap {
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      h1 {
        font-family: "Fredoka One", cursive;
        color: var(--primary);
        font-size: 1.4rem;
        margin: 0 0 8px 0;
      }
      .sub {
        font-size: 0.9rem;
        color: #636e72;
        margin-bottom: 20px;
      }
      .current-number {
        font-family: "Fredoka One", cursive;
        font-size: clamp(2rem, 10vw, 3rem);
        margin-bottom: 16px;
      }
      .history-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        min-height: 40px;
      }
      .history-ball {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 0.8rem;
      }
      .history-ball.history-ball-emoji {
        font-size: 1.1rem;
      }
      .leave {
        margin-top: 24px;
        color: var(--secondary);
        font-weight: 700;
      }
      .error {
        color: var(--primary);
        margin-top: 12px;
      }
      .skip-to-main {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .skip-to-main:focus {
        position: fixed;
        left: max(12px, env(safe-area-inset-left));
        top: max(12px, env(safe-area-inset-top));
        z-index: 10000;
        width: auto;
        height: auto;
        margin: 0;
        padding: 12px 18px;
        overflow: visible;
        clip: auto;
        white-space: normal;
        background: var(--secondary);
        color: #fff;
        font-weight: 700;
        font-family: inherit;
        text-decoration: none;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      @media (max-width: 600px) {
        body {
          padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        }
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-to-main" data-i18n="a11y.skipToMain">Skip to main content</a>
    <main id="main-content">
    <div id="wrap">
      <h1 id="spec-title" data-i18n="spectator.heading"></h1>
      <p class="sub" id="spec-sub" data-i18n="spectator.subtitle"></p>
      <p id="spec-current-label" class="sub" data-i18n="spectator.currentLabel"></p>
      <div id="current-number" class="current-number" aria-live="polite" aria-atomic="true">--</div>
      <p id="spec-history-label" class="sub" data-i18n="spectator.historyLabel"></p>
      <div
        id="history-wrap"
        class="history-wrap"
        data-i18n="spectator.history.aria"
        data-i18n-attr="aria-label"
      ></div>
      <p id="spec-stream-status" class="sub hidden" role="status" aria-live="polite"></p>
      <p id="err" class="error hidden" role="status" aria-live="polite"></p>
      <a href="join.html" class="leave" id="spec-leave" data-i18n="spectator.leave"></a>
      <p class="join-lang-switch" style="margin-top: 20px; font-size: 0.9rem">
        <a href="?lang=en" data-lang-link="en" data-i18n="join.lang.en"></a>
        <span aria-hidden="true"> · </span>
        <a href="?lang=he" data-lang-link="he" data-i18n="join.lang.he"></a>
      </p>
    </div>
    </main>
    <script type="module">
      import { initI18n, t, setLocalePreference } from "./i18n.js";
      import { nextReconnectDelayMs, SSE_RECONNECT_INITIAL_MS } from "./streamReconnect.js";
      import { ICONS_KIDS_V1_ID, resolveDisplay, normalizeKeySetId } from "./keysets.js";
      import { formatCurrentCallForDisplay } from "./cardSizeCalling.js";

      await initI18n();
      document.title = t("spectator.pageTitle");

      document.querySelectorAll("[data-lang-link]").forEach((a) => {
        a.addEventListener("click", (e) => {
          e.preventDefault();
          setLocalePreference(a.getAttribute("data-lang-link"), true);
        });
      });

      const JOIN_STORAGE = { roomId: "bingabu-join-roomId", joinToken: "bingabu-join-token" };

      function getApiBase() {
        return typeof window !== "undefined" && window.location && window.location.origin ? window.location.origin : "";
      }

      const params = new URLSearchParams(window.location.search);
      let roomId = params.get("room") || sessionStorage.getItem(JOIN_STORAGE.roomId);
      const joinToken = sessionStorage.getItem(JOIN_STORAGE.joinToken);

      function squareCardSizeFromState(state) {
        const cr = state && state.cardRows;
        if (cr === 3 || cr === 4 || cr === 5) return cr;
        const cards = state && state.participantCards;
        if (Array.isArray(cards) && cards.length > 0 && Array.isArray(cards[0])) {
          const n = cards[0].length;
          if (n === 3 || n === 4 || n === 5) return n;
        }
        return 5;
      }

      function render(state) {
        const drawnSequence = (state && state.drawnSequence) || [];
        const lastNum = drawnSequence[drawnSequence.length - 1];
        const cur = document.getElementById("current-number");
        const hist = document.getElementById("history-wrap");
        const ks = normalizeKeySetId(state && state.displayKeySetId);
        const square = squareCardSizeFromState(state);
        if (cur) {
          if (lastNum) {
            const d = resolveDisplay(lastNum, ks);
            cur.textContent = formatCurrentCallForDisplay(lastNum, d.text, square);
          } else {
            cur.textContent = "--";
          }
        }
        if (hist) {
          hist.innerHTML = "";
          hist.setAttribute("role", "list");
          drawnSequence.slice(-20).forEach((n) => {
            const ball = document.createElement("div");
            ball.className = "history-ball";
            ball.setAttribute("role", "listitem");
            const dn = resolveDisplay(n, ks);
            ball.textContent = dn.text;
            if (ks === ICONS_KIDS_V1_ID) ball.classList.add("history-ball-emoji");
            hist.appendChild(ball);
          });
        }
      }

      function setStreamReconnecting(show) {
        const st = document.getElementById("spec-stream-status");
        if (!st) return;
        if (show) {
          st.textContent = t("spectator.status.reconnecting");
          st.classList.remove("hidden");
        } else {
          st.textContent = "";
          st.classList.add("hidden");
        }
      }

      async function fetchRoom() {
        const errEl = document.getElementById("err");
        if (errEl) {
          errEl.classList.add("hidden");
          errEl.textContent = "";
        }
        setStreamReconnecting(false);
        try {
          const headers = {};
          if (joinToken) headers["Authorization"] = "Bearer " + joinToken;
          const res = await fetch(`${getApiBase()}/api/rooms/${roomId}`, { headers });
          const data = await res.json().catch(() => ({}));
          if (res.status === 404) {
            if (errEl) {
              errEl.textContent = t("spectator.error.roomGone");
              errEl.classList.remove("hidden");
            }
            return;
          }
          if (data.passwordRequired) {
            if (errEl) {
              errEl.textContent = t("spectator.error.needJoin");
              errEl.classList.remove("hidden");
            }
            return;
          }
          if (data.state) render(data.state);
        } catch (_) {
          if (errEl) {
            errEl.textContent = t("join.error.network");
            errEl.classList.remove("hidden");
          }
        }
      }

      let eventSource = null;
      let reconnectDelayMs = SSE_RECONNECT_INITIAL_MS;

      function connectStream() {
        if (eventSource) {
          try {
            eventSource.close();
          } catch (_) {}
        }
        const qs = joinToken ? "?joinToken=" + encodeURIComponent(joinToken) : "";
        const url = `${getApiBase()}/api/rooms/${roomId}/stream${qs}`;
        try {
          eventSource = new EventSource(url);
          eventSource.onopen = () => {
            reconnectDelayMs = SSE_RECONNECT_INITIAL_MS;
            setStreamReconnecting(false);
          };
          eventSource.onmessage = () => fetchRoom();
          eventSource.onerror = () => {
            setStreamReconnecting(true);
            try {
              eventSource.close();
            } catch (_) {}
            eventSource = null;
            const wait = reconnectDelayMs;
            reconnectDelayMs = nextReconnectDelayMs(reconnectDelayMs);
            setTimeout(connectStream, wait);
          };
        } catch (_) {
          eventSource = null;
        }
      }

      if (!roomId) {
        document.getElementById("wrap").innerHTML = `<p>${t("spectator.error.missingRoom")}</p><a href="join.html">${t("spectator.leave")}</a>`;
      } else {
        fetchRoom();
        if (typeof EventSource !== "undefined") connectStream();
        else setInterval(fetchRoom, 2000);
      }

      window.addEventListener("beforeunload", () => {
        if (eventSource) try { eventSource.close(); } catch (_) {}
      });
    </script>
  </body>
</html>
