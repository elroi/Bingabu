<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var SUPPORTED = ["en", "he"];
        function norm(t) {
          if (!t) return null;
          var l = String(t).trim().toLowerCase();
          if (SUPPORTED.indexOf(l) >= 0) return l;
          var two = l.slice(0, 2);
          if (SUPPORTED.indexOf(two) >= 0) return two;
          return null;
        }
        try {
          var params = new URLSearchParams(window.location.search);
          var loc = norm(params.get("lang"));
          if (!loc) loc = norm(localStorage.getItem("bingabu-locale"));
          if (!loc) {
            var n = (navigator.language || "").toLowerCase();
            if (n.indexOf("he") === 0) loc = "he";
          }
          if (!loc) loc = "en";
          document.documentElement.lang = loc;
          document.documentElement.dir = loc === "he" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join game – Bingabu</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #ff6b6b;
        --secondary: #4ecdc4;
        --accent: #ffe66d;
        --bg: #f7f9fc;
        --text: #2d3436;
        --b-col: #ff6b6b;
        --i-col: #feca57;
        --n-col: #48dbfb;
        --g-col: #1dd1a1;
        --o-col: #ff9ff3;
      }
      body {
        font-family: "Quicksand", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      h1 {
        font-family: "Fredoka One", cursive;
        color: var(--primary);
        font-size: 1.8rem;
        margin: 0 0 24px 0;
      }
      h1.centered {
        text-align: center;
      }
      .join-step {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .hidden {
        display: none !important;
      }
      .join-step.hidden {
        display: none !important;
      }
      label {
        font-weight: 700;
        display: block;
        margin-bottom: 4px;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid var(--secondary);
        font-family: inherit;
        font-size: 1rem;
        box-sizing: border-box;
      }
      button {
        font-family: "Fredoka One", cursive;
        cursor: pointer;
        padding: 12px 24px;
        border-radius: 50px;
        border: none;
        background: var(--secondary);
        color: white;
        font-size: 1rem;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .btn-watch-secondary {
        width: 100%;
        margin-bottom: 12px;
        background: var(--bg);
        color: var(--text);
        border: 2px solid var(--secondary);
      }
      .join-slot-fieldset {
        border: none;
        padding: 0;
        margin: 0;
      }
      .slot-legend {
        font-weight: 700;
        margin-bottom: 8px;
        padding: 0;
      }
      .join-hint {
        margin: 0 0 12px 0;
        font-size: 0.9rem;
        color: var(--text);
      }
      .join-hint.qr-hint {
        margin-top: 8px;
      }
      .join-page-content {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .back-to-lobby {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        margin-bottom: 16px;
        padding: 10px 0;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border-radius: 8px;
        transition: background 0.15s, color 0.15s;
      }
      .back-to-lobby:hover {
        color: var(--secondary);
        background: rgba(78, 205, 196, 0.1);
      }
      .back-to-lobby:focus {
        outline: 2px solid var(--secondary);
        outline-offset: 2px;
      }
      .app-logo {
        font-family: "Fredoka One", cursive;
        font-size: 1.75rem;
        margin: 0 auto 16px auto;
        text-decoration: none;
        display: block;
        width: fit-content;
        line-height: 1.1;
        letter-spacing: -0.02em;
        text-shadow: 2px 2px 0 var(--accent);
        transition: opacity 0.15s;
      }
      .app-logo:hover {
        opacity: 0.9;
      }
      .app-logo:focus {
        outline: 2px solid var(--secondary);
        outline-offset: 4px;
      }
      .app-logo .letter {
        display: inline-block;
        animation: letterPop 0.4s ease-out backwards;
      }
      .app-logo .letter:nth-child(1) { color: var(--b-col); animation-delay: 0.05s; }
      .app-logo .letter:nth-child(2) { color: var(--i-col); animation-delay: 0.1s; }
      .app-logo .letter:nth-child(3) { color: var(--n-col); animation-delay: 0.15s; }
      .app-logo .letter:nth-child(4) { color: var(--g-col); animation-delay: 0.2s; }
      .app-logo .letter:nth-child(5) { color: var(--accent); animation-delay: 0.25s; }
      .app-logo .letter:nth-child(6) { color: var(--b-col); animation-delay: 0.3s; }
      .app-logo .letter:nth-child(7) { color: var(--o-col); animation-delay: 0.35s; }
      @keyframes letterPop {
        from {
          opacity: 0;
          transform: scale(0.6) translateY(8px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .error {
        color: var(--primary);
        font-size: 0.9rem;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .qr-scanner-title {
        margin: 0 0 12px 0;
        font-size: 1.05rem;
        font-weight: 700;
        text-align: center;
        color: var(--text);
      }
      .slot-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .slot-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        margin-bottom: 8px;
        border-radius: 12px;
        border: 2px solid var(--secondary);
        background: white;
      }
      .slot-list li.taken {
        border-color: #b2bec3;
        background: #dfe6e9;
        color: #636e72;
      }
      .slot-list li button {
        flex-shrink: 0;
        min-height: 44px;
      }
      .slot-list li.taken button {
        display: none;
      }

      .btn-scan {
        background: var(--bg);
        color: var(--text);
        border: 2px solid var(--secondary);
      }
      .btn-scan:hover {
        background: white;
      }

      #qr-scanner-wrap {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        box-sizing: border-box;
      }
      #qr-scanner-wrap.hidden {
        display: none !important;
      }
      .qr-reader-container {
        width: 100%;
        max-width: 320px;
        min-height: 240px;
        border-radius: 12px;
        overflow: hidden;
        background: #111;
      }
      .qr-reader-container video {
        display: block;
        width: 100%;
        max-height: 50vh;
      }
      #qr-reader__scan_region {
        background: transparent;
      }
      .qr-scanner-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-top: 16px;
      }
      #btn-qr-switch-camera,
      #btn-qr-cancel {
        min-height: 44px;
        padding: 12px 24px;
      }
      .btn-qr-secondary {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.5);
      }
      .btn-qr-secondary:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      #btn-qr-switch-camera.hidden {
        display: none !important;
      }
      #qr-scanner-error {
        color: white;
        text-align: center;
        margin: 16px 0 0;
        max-width: 320px;
      }
      #qr-scanner-error.hidden {
        display: none !important;
      }

      .join-lang-switch {
        margin-top: 24px;
        text-align: center;
        font-size: 0.9rem;
      }
      .join-lang-switch a {
        color: var(--secondary);
        text-decoration: none;
      }
      .join-lang-switch a:hover {
        text-decoration: underline;
      }
      html[lang="he"] body {
        font-family: "Rubik", "Quicksand", sans-serif;
      }
      html[lang="he"] h1,
      html[lang="he"] button,
      html[lang="he"] label {
        font-family: "Rubik", sans-serif;
      }
      html[dir="rtl"] .join-page-content {
        text-align: right;
      }
      /* Inline-start = right in RTL; flex-end was physical left (inline-end). */
      html[dir="rtl"] .back-to-lobby {
        align-self: start;
      }

      @media (max-width: 600px) {
        body {
          padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }
        h1 {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main id="main-content">
    <div class="join-page-content">
      <a href="index.html" id="nav-back" class="back-to-lobby" dir="ltr" data-i18n="join.back"></a>
      <a href="index.html" id="nav-logo" class="app-logo hidden" dir="ltr" translate="no">
        <span class="letter">B</span><span class="letter">i</span><span class="letter">n</span><span class="letter">g</span><span class="letter">a</span><span class="letter">b</span><span class="letter">u</span>
      </a>
      <h1 id="join-title" data-i18n="join.title"></h1>
      <div id="step-code" class="join-step">
      <p class="join-hint" data-i18n="join.hint.code"></p>
      <label for="room-code" data-i18n="join.label.roomCode"></label>
      <input
        type="text"
        id="room-code"
        data-i18n="join.placeholder.roomCode"
        data-i18n-attr="placeholder"
        autocomplete="off"
      />
      <p id="code-error" class="error hidden" role="status" aria-live="polite"></p>
      <button type="button" id="btn-code" data-i18n="join.btn.continue"></button>
      <p class="join-hint qr-hint" data-i18n="join.hint.qr"></p>
      <button type="button" id="btn-scan-qr" class="btn-scan" data-i18n="join.btn.scanQr"></button>
    </div>
    <div id="step-password" class="join-step hidden">
      <form
        id="password-form"
        onsubmit="return false;"
        data-i18n="join.passwordForm.aria"
        data-i18n-attr="aria-label"
      >
        <label for="room-password" data-i18n="join.label.password"></label>
        <input
          type="password"
          id="room-password"
          data-i18n="join.placeholder.password"
          data-i18n-attr="placeholder"
          autocomplete="off"
        />
        <p id="password-error" class="error hidden" role="status" aria-live="polite"></p>
        <button type="button" id="btn-password" data-i18n="join.btn.enterRoom"></button>
      </form>
    </div>
    <div id="step-pick" class="join-step hidden">
      <button type="button" id="btn-watch-only" class="btn-watch-secondary" data-i18n="join.btn.watchOnly"></button>
      <fieldset class="join-slot-fieldset">
        <legend class="slot-legend" data-i18n="join.slotFieldsetLegend"></legend>
        <ul id="slot-list" class="slot-list" role="list"></ul>
      </fieldset>
      <p id="pick-error" class="error hidden" role="status" aria-live="polite"></p>
    </div>
    <p class="join-lang-switch">
      <a href="?lang=en" data-lang-link="en" data-i18n="join.lang.en"></a>
      <span aria-hidden="true"> · </span>
      <a href="?lang=he" data-lang-link="he" data-i18n="join.lang.he"></a>
    </p>
    </div>

    <div
      id="qr-scanner-wrap"
      class="hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="qr-scanner-title"
    >
      <h2 id="qr-scanner-title" class="qr-scanner-title" data-i18n="join.qr.dialogTitle"></h2>
      <div id="qr-reader" class="qr-reader-container"></div>
      <div class="qr-scanner-actions">
        <button type="button" id="btn-qr-switch-camera" class="btn-qr-secondary hidden" data-i18n="join.qr.switchCamera"></button>
        <button type="button" id="btn-qr-cancel" data-i18n="join.qr.cancel"></button>
      </div>
      <p id="qr-scanner-error" class="hidden" aria-live="polite"></p>
    </div>
    </main>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script type="module">
      import { initI18n, t, setLocalePreference } from "./i18n.js";

      await initI18n();
      document.title = t("join.pageTitle");

      const navBackEl = document.getElementById("nav-back");
      if (navBackEl) navBackEl.setAttribute("aria-label", t("join.back.aria"));
      const navLogoEl = document.getElementById("nav-logo");
      if (navLogoEl) navLogoEl.setAttribute("aria-label", t("join.navLogo.aria"));

      document.querySelectorAll("[data-lang-link]").forEach((a) => {
        a.addEventListener("click", (e) => {
          e.preventDefault();
          setLocalePreference(a.getAttribute("data-lang-link"), true);
        });
      });

      const JOIN_STORAGE = { roomId: "bingabu-join-roomId", joinToken: "bingabu-join-token", deviceId: "bingabu-device-id", slotIndex: "bingabu-slot-index" };

      function getApiBase() {
        return typeof window !== "undefined" && window.location && window.location.origin ? window.location.origin : "";
      }

      function getDeviceId() {
        let id = sessionStorage.getItem(JOIN_STORAGE.deviceId);
        if (!id) {
          id = "d-" + Math.random().toString(36).slice(2) + "-" + Date.now().toString(36);
          sessionStorage.setItem(JOIN_STORAGE.deviceId, id);
        }
        return id;
      }

      function showStep(id) {
        document.querySelectorAll(".join-step").forEach((el) => el.classList.add("hidden"));
        const step = document.getElementById(id);
        if (step) step.classList.remove("hidden");
      }

      function showError(id, msg) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = msg || "";
        el.classList.toggle("hidden", !msg);
      }

      function alreadyInThisRoom(roomCode) {
        const normalized = (roomCode || "").trim().toUpperCase();
        if (!normalized) return false;
        const storedRoomId = sessionStorage.getItem(JOIN_STORAGE.roomId);
        const storedSlot = sessionStorage.getItem(JOIN_STORAGE.slotIndex);
        return storedRoomId === normalized && storedSlot != null && storedSlot !== "";
      }

      const params = new URLSearchParams(window.location.search);
      const joinFromUrl = params.get("join") || params.get("room") || params.get("code");

      if (joinFromUrl) {
        if (alreadyInThisRoom(joinFromUrl)) {
          const roomId = sessionStorage.getItem(JOIN_STORAGE.roomId);
          const slotIndex = sessionStorage.getItem(JOIN_STORAGE.slotIndex);
          window.location.replace(`player.html?room=${encodeURIComponent(roomId)}&slot=${slotIndex}`);
        } else {
        document.getElementById("room-code").value = joinFromUrl;
        const hint = document.querySelector(".join-hint");
        if (hint) hint.classList.add("hidden");
        const qrHint = document.querySelector(".join-hint.qr-hint");
        if (qrHint) qrHint.classList.add("hidden");
        const scanBtn = document.getElementById("btn-scan-qr");
        if (scanBtn) scanBtn.classList.add("hidden");
        const navBack = document.getElementById("nav-back");
        const navLogo = document.getElementById("nav-logo");
        if (navBack) navBack.classList.add("hidden");
        if (navLogo) navLogo.classList.remove("hidden");
        const joinTitle = document.getElementById("join-title");
        if (joinTitle) joinTitle.classList.add("centered");
        }
      }

      async function goWithCode(code) {
        code = (code || "").trim().toUpperCase();
        showError("code-error", "");
        if (!code) {
          showError("code-error", t("join.error.enterCode"));
          return;
        }
        const btn = document.getElementById("btn-code");
        if (btn) {
          btn.disabled = true;
          btn.setAttribute("aria-busy", "true");
        }
        try {
          const res = await fetch(`${getApiBase()}/api/rooms/${code}`);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError("code-error", data.error || t("join.error.roomNotFound"));
            return;
          }
          if (data.passwordRequired) {
            sessionStorage.setItem(JOIN_STORAGE.roomId, code);
            showStep("step-password");
            document.getElementById("room-password").value = "";
            document.getElementById("room-password").focus();
            return;
          }
          sessionStorage.setItem(JOIN_STORAGE.roomId, code);
          if (alreadyInThisRoom(code)) {
            const roomId = sessionStorage.getItem(JOIN_STORAGE.roomId);
            const slotIndex = sessionStorage.getItem(JOIN_STORAGE.slotIndex);
            window.location.replace(`player.html?room=${encodeURIComponent(roomId)}&slot=${slotIndex}`);
            return;
          }
          const state = data.state != null ? data.state : data;
          window._joinRoomState = state;
          window._joinRoomClaims = data.claims || {};
          renderSlotList(state, data.claims || {});
          showStep("step-pick");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.removeAttribute("aria-busy");
          }
        }
      }

      document.getElementById("btn-code").addEventListener("click", () => {
        const codeInput = document.getElementById("room-code");
        goWithCode(codeInput && codeInput.value);
      });

      function isJoinUrl(text) {
        if (!text || typeof text !== "string") return false;
        try {
          const u = new URL(text);
          if (u.protocol !== "http:" && u.protocol !== "https:") return false;
          return u.pathname.includes("join");
        } catch (_) {
          return false;
        }
      }

      let qrScanner = null;
      let qrCameras = [];
      let qrCameraIndex = 0;
      let qrDialogReturnFocus = null;
      const qrWrap = document.getElementById("qr-scanner-wrap");
      const qrReaderEl = document.getElementById("qr-reader");
      const qrScannerError = document.getElementById("qr-scanner-error");
      const btnScanQr = document.getElementById("btn-scan-qr");
      const btnQrCancel = document.getElementById("btn-qr-cancel");
      const btnQrSwitchCamera = document.getElementById("btn-qr-switch-camera");

      function restoreQrDialogFocus() {
        const el = qrDialogReturnFocus;
        qrDialogReturnFocus = null;
        if (el && typeof el.focus === "function") {
          try {
            el.focus();
          } catch (_) {}
        }
      }

      function closeQrScanner() {
        const finish = () => {
          if (qrReaderEl) qrReaderEl.innerHTML = "";
          qrScanner = null;
          qrCameras = [];
          if (qrWrap) qrWrap.classList.add("hidden");
          if (qrScannerError) {
            qrScannerError.classList.add("hidden");
            qrScannerError.textContent = "";
          }
          if (btnQrSwitchCamera) btnQrSwitchCamera.classList.add("hidden");
          restoreQrDialogFocus();
        };
        if (qrScanner) {
          qrScanner
            .stop()
            .catch(() => {})
            .finally(finish);
        } else {
          finish();
        }
      }

      function onQrScanSuccess(decodedText) {
        if (!isJoinUrl(decodedText)) return;
        closeQrScanner();
        window.location.href = decodedText;
      }

      async function startQrCamera(cameraIdOrConfig) {
        if (!qrScanner || !qrReaderEl) return;
        const config = { fps: 10 };
        await qrScanner.start(cameraIdOrConfig, config, onQrScanSuccess, () => {});
      }

      async function openQrScanner() {
        if (!qrReaderEl || !qrWrap) return;
        qrDialogReturnFocus = document.activeElement;
        if (qrScanner) {
          qrScanner.stop().catch(() => {});
          qrScanner = null;
        }
        qrReaderEl.innerHTML = "";
        qrWrap.classList.remove("hidden");
        qrScannerError.classList.add("hidden");
        qrScannerError.textContent = "";
        if (btnQrSwitchCamera) btnQrSwitchCamera.classList.add("hidden");
        requestAnimationFrame(() => {
          if (btnQrCancel && typeof btnQrCancel.focus === "function") btnQrCancel.focus();
        });
        const Html5Qrcode = window.Html5Qrcode;
        if (!Html5Qrcode) {
          qrScannerError.textContent = t("join.qr.failLoad");
          qrScannerError.classList.remove("hidden");
          return;
        }
        qrScanner = new Html5Qrcode("qr-reader");
        try {
          const devices = await Html5Qrcode.getCameras();
          if (devices && devices.length > 0) {
            qrCameras = devices;
            const backIndex = devices.findIndex((d) => /back|rear|environment/i.test(d.label || ""));
            qrCameraIndex = backIndex >= 0 ? backIndex : 0;
            await startQrCamera(devices[qrCameraIndex].id);
            if (devices.length > 1 && btnQrSwitchCamera) {
              btnQrSwitchCamera.classList.remove("hidden");
            }
          } else {
            await startQrCamera({ facingMode: "environment" });
          }
        } catch (err) {
          try {
            await startQrCamera({ facingMode: "environment" });
            if (qrCameras.length > 1 && btnQrSwitchCamera) btnQrSwitchCamera.classList.remove("hidden");
          } catch (err2) {
            qrScanner = null;
            qrReaderEl.innerHTML = "";
            qrScannerError.textContent = t("join.qr.noCamera");
            qrScannerError.classList.remove("hidden");
          }
        }
      }

      async function switchQrCamera() {
        if (!qrScanner || qrCameras.length < 2) return;
        qrCameraIndex = (qrCameraIndex + 1) % qrCameras.length;
        try {
          await qrScanner.stop();
          await startQrCamera(qrCameras[qrCameraIndex].id);
        } catch (err) {
          qrScannerError.textContent = t("join.qr.switchFail");
          qrScannerError.classList.remove("hidden");
        }
      }

      if (btnScanQr) btnScanQr.addEventListener("click", () => openQrScanner());
      if (btnQrCancel) btnQrCancel.addEventListener("click", () => closeQrScanner());
      if (btnQrSwitchCamera) btnQrSwitchCamera.addEventListener("click", () => switchQrCamera());

      if (qrWrap) {
        qrWrap.addEventListener("keydown", (e) => {
          if (e.key !== "Tab" || qrWrap.classList.contains("hidden")) return;
          const list = [btnQrSwitchCamera, btnQrCancel].filter(
            (el) => el && !el.classList.contains("hidden")
          );
          if (list.length === 0) return;
          const i = list.indexOf(document.activeElement);
          if (i === -1) return;
          e.preventDefault();
          const next = e.shiftKey ? list[(i - 1 + list.length) % list.length] : list[(i + 1) % list.length];
          if (next) next.focus();
        });
      }

      document.getElementById("btn-password").addEventListener("click", async () => {
        const roomId = sessionStorage.getItem(JOIN_STORAGE.roomId);
        const password = document.getElementById("room-password").value;
        showError("password-error", "");
        const btn = document.getElementById("btn-password");
        btn.disabled = true;
        btn.setAttribute("aria-busy", "true");
        try {
          const res = await fetch(`${getApiBase()}/api/rooms/${roomId}/join`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError("password-error", data.error || t("join.error.wrongPassword"));
            return;
          }
          sessionStorage.setItem(JOIN_STORAGE.joinToken, data.joinToken || "");
          window._joinRoomState = data.state;
          window._joinRoomClaims = data.claims || {};
          if (alreadyInThisRoom(roomId)) {
            const slotIndex = sessionStorage.getItem(JOIN_STORAGE.slotIndex);
            window.location.replace(`player.html?room=${encodeURIComponent(roomId)}&slot=${slotIndex}`);
            return;
          }
          renderSlotList(data.state, data.claims || {});
          showStep("step-pick");
        } finally {
          btn.disabled = false;
          btn.removeAttribute("aria-busy");
        }
      });

      function renderSlotList(state, claims) {
        const list = document.getElementById("slot-list");
        if (!list) return;
        const names = (state && state.participantNames) || [];
        const np = (state && state.numParticipants) || 0;
        list.innerHTML = "";
        for (let i = 0; i < np; i++) {
          const li = document.createElement("li");
          li.setAttribute("role", "listitem");
          const name = (names[i] && names[i].trim()) || t("join.slot.playerN", { n: i + 1 });
          const taken = Object.prototype.hasOwnProperty.call(claims, String(i));
          if (taken) li.classList.add("taken");
          li.innerHTML = `<span>${name}${taken ? t("join.slot.taken") : ""}</span>`;
          if (!taken) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = t("join.btn.joinAsPlayer");
            btn.addEventListener("click", () => claimSlot(i, btn));
            li.appendChild(btn);
          }
          list.appendChild(li);
        }
      }

      const btnWatchOnly = document.getElementById("btn-watch-only");
      if (btnWatchOnly) {
        btnWatchOnly.addEventListener("click", () => {
          const rid = sessionStorage.getItem(JOIN_STORAGE.roomId);
          if (!rid) return;
          window.location.href = `spectator.html?room=${encodeURIComponent(rid)}`;
        });
      }

      async function claimSlot(slotIndex, slotBtn) {
        const roomId = sessionStorage.getItem(JOIN_STORAGE.roomId);
        const joinToken = sessionStorage.getItem(JOIN_STORAGE.joinToken);
        const deviceId = getDeviceId();
        showError("pick-error", "");
        if (slotBtn) {
          slotBtn.disabled = true;
          slotBtn.setAttribute("aria-busy", "true");
        }
        try {
          const headers = { "Content-Type": "application/json" };
          if (joinToken) headers["Authorization"] = "Bearer " + joinToken;
          const res = await fetch(`${getApiBase()}/api/rooms/${roomId}/claim`, {
            method: "POST",
            headers,
            body: JSON.stringify({ slotIndex, deviceId }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError("pick-error", data.error || t("join.error.couldNotJoin"));
            return;
          }
          if (data.joinToken) sessionStorage.setItem(JOIN_STORAGE.joinToken, data.joinToken);
          sessionStorage.setItem(JOIN_STORAGE.slotIndex, String(slotIndex));
          window.location.replace(`player.html?room=${encodeURIComponent(roomId)}&slot=${slotIndex}`);
        } catch (e) {
          showError("pick-error", t("join.error.network"));
        } finally {
          if (slotBtn) {
            slotBtn.disabled = false;
            slotBtn.removeAttribute("aria-busy");
          }
        }
      }
    </script>
  </body>
</html>
