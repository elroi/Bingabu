<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var SUPPORTED = ["en", "he"];
        function norm(t) {
          if (!t) return null;
          var l = String(t).trim().toLowerCase();
          if (SUPPORTED.indexOf(l) >= 0) return l;
          var two = l.slice(0, 2);
          if (SUPPORTED.indexOf(two) >= 0) return two;
          return null;
        }
        try {
          var params = new URLSearchParams(window.location.search);
          var loc = norm(params.get("lang"));
          if (!loc) loc = norm(localStorage.getItem("bingabu-locale"));
          if (!loc) {
            var n = (navigator.language || "").toLowerCase();
            if (n.indexOf("he") === 0) loc = "he";
          }
          if (!loc) loc = "en";
          document.documentElement.lang = loc;
          document.documentElement.dir = loc === "he" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
