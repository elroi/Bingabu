<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var SUPPORTED = ["en", "he"];
        function norm(t) {
          if (!t) return null;
          var l = String(t).trim().toLowerCase();
          if (SUPPORTED.indexOf(l) >= 0) return l;
          var two = l.slice(0, 2);
          if (SUPPORTED.indexOf(two) >= 0) return two;
          return null;
        }
        try {
          var params = new URLSearchParams(window.location.search);
          var loc = norm(params.get("lang"));
          if (!loc) loc = norm(localStorage.getItem("bingabu-locale"));
          if (!loc) {
            var n = (navigator.language || "").toLowerCase();
            if (n.indexOf("he") === 0) loc = "he";
          }
          if (!loc) loc = "en";
          document.documentElement.lang = loc;
          document.documentElement.dir = loc === "he" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy – Bingabu</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Quicksand", sans-serif;
        max-width: 40rem;
        margin: 2rem auto;
        padding: 0 max(1rem, env(safe-area-inset-right)) 0 max(1rem, env(safe-area-inset-left));
        padding-top: max(2rem, env(safe-area-inset-top));
        padding-bottom: max(2rem, env(safe-area-inset-bottom));
        line-height: 1.5;
      }
      a {
        color: #4ecdc4;
      }
      @media (max-width: 600px) {
        body {
          margin: 1rem auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="privacy.heading"></h1>
      <p data-i18n="privacy.body"></p>
      <p><a href="index.html" data-i18n="join.back"></a></p>
    </main>
    <script type="module">
      import { initI18n, t } from "./i18n.js";
      await initI18n();
      document.title = t("privacy.pageTitle");
    </script>
  </body>
</html>
